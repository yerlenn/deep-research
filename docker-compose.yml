services:
  postgres:
    image: postgres:16-alpine
    container_name: deep-research-postgres
    environment:
      POSTGRES_DB: deep_research
      POSTGRES_USER: deep_research
      POSTGRES_PASSWORD: deep_research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deep_research -d deep_research"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    profiles: ["worker"]
    image: python:3.11-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && python -m app.worker"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://deep_research:deep_research@postgres:5432/deep_research
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
